<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leonard Abraham | Cinematographer</title>
  <meta name="description" content="Leonard Abraham is a cinematographer based in Los Angeles." />
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #f3f0ea;
      --muted: rgba(243,240,234,0.62);
      --line: rgba(255,255,255,0.1);
      --accent: #d6c2a0;
      --max: 1240px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #090909 0%, #0a0a0a 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: 26px 26px 70px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 4px 0 34px;
    }

    .brand {
      font-size: 0.9rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .nav {
      display: flex;
      gap: 20px;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero {
      padding: 8vh 0 10vh;
      border-top: 1px solid transparent;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.6rem);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .role {
      margin-top: 16px;
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status {
      margin-top: 42px;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .section {
      padding-top: 34px;
      border-top: 1px solid var(--line);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 18px;
      margin-bottom: 22px;
    }

    .section-title {
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-note {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .stills-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .still {
      aspect-ratio: 4 / 5;
      background: #111;
      border: 1px solid var(--line);
      overflow: hidden;
      position: relative;
    }

    .still img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(243,240,234,0.28);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 34px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 0.92rem;
    }

    .footer a {
      color: var(--text);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .stills-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 18px 18px 48px;
      }

      .topbar,
      .footer,
      .section-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .stills-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">Leonard Abraham</div>
      <nav class="nav">
        <a href="#stills">Selected Work</a>
        <a href="mailto:info@leonardabrahamdp.com">Contact</a>
      </nav>
    </header>

    <main class="hero">
      <h1>Leonard Abraham</h1>
      <div class="role">Cinematographer</div>
      <div class="status">Site in progress</div>
    </main>

    <section class="section" id="stills">
      <div class="section-head">
        <div class="section-title">Selected Work</div>
        <div class="section-note">Replace these placeholders with your stills.</div>
      </div>

      <div class="stills-grid">
        <div class="still"><div class="placeholder">Still 01</div></div>
        <div class="still"><div class="placeholder">Still 02</div></div>
        <div class="still"><div class="placeholder">Still 03</div></div>
        <div class="still"><div class="placeholder">Still 04</div></div>
        <div class="still"><div class="placeholder">Still 05</div></div>
        <div class="still"><div class="placeholder">Still 06</div></div>
      </div>
    </section>

    <footer class="footer">
      <div>
        <a href="mailto:info@leonardabrahamdp.com">info@leonardabrahamdp.com</a>
      </div>
      <div class="muted">Los Angeles</div>
    </footer>
  </div>
</body>
</html>
